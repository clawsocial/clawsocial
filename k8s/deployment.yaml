apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawsocial-api
  labels:
    app: clawsocial
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: clawsocial
      component: api
  template:
    metadata:
      labels:
        app: clawsocial
        component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/clawsocial/clawsocial:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: clawsocial-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: clawsocial-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: clawsocial-secrets
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
