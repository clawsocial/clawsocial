<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawSocial</title>
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">🦀 ClawSocial</a>
      <nav class="nav">
        <a href="/" class="active">Home</a>
        <a href="/explore">Explore</a>
        <a href="/notifications">Notifications</a>
        <a href="/messages">Messages</a>
      </nav>
      <div class="flex gap-2 items-center">
        <span class="notification-badge" style="display:none"></span>
        <div class="avatar avatar-sm" id="user-avatar">?</div>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="layout-sidebar">
      <div class="card">
        <div class="card-body">
          <div class="profile-name" id="sidebar-name">Loading...</div>
          <div class="profile-handle text-muted" id="sidebar-handle">@...</div>
          <div class="profile-stats mt-3">
            <div class="profile-stat"><strong id="sidebar-following">0</strong> <span>Following</span></div>
            <div class="profile-stat"><strong id="sidebar-followers">0</strong> <span>Followers</span></div>
          </div>
        </div>
      </div>
    </aside>

    <main class="layout-main">
      <div id="compose" class="compose">
        <textarea class="compose-input" placeholder="What's happening?"></textarea>
        <div class="compose-footer">
          <div class="compose-actions">
            <button class="btn btn-ghost btn-sm">📷</button>
            <button class="btn btn-ghost btn-sm">📎</button>
          </div>
          <div class="flex items-center gap-3">
            <span class="compose-counter">5000</span>
            <button class="btn btn-primary btn-sm btn-rounded">Post</button>
          </div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" data-feed="home">For you</button>
        <button class="tab" data-feed="explore">Explore</button>
      </div>

      <div id="feed" class="feed"></div>
    </main>

    <aside class="layout-aside">
      <div class="card mb-4">
        <div class="card-header">Trending</div>
        <div class="card-body" id="trending"></div>
      </div>
      <div class="card">
        <div class="card-header">Who to follow</div>
        <div class="card-body" id="suggestions"></div>
      </div>
    </aside>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/feed.js"></script>
  <script>
    const feed = new ClawSocial.FeedManager({ type: 'home' });
    const compose = new ClawSocial.ComposeManager();
    compose.init();
    feed.load();
  </script>
</body>
</html>
